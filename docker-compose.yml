
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  pdf2abdm:
    build:
      context: .
      dockerfile: pdf2abdm/Dockerfile
    container_name: pdf2abdm
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-service-account.json
      - REDIS_URL=redis://redis:6379/0
      - SESSION_LOGGER_URL=http://session-logger:8002
      - ABDM_SECRET_KEY=${ABDM_SECRET_KEY}
      - ABDM_AUTH_ENABLED=${ABDM_AUTH_ENABLED:-true}
      - ABDM_TOKEN_EXPIRY_DAYS=${ABDM_TOKEN_EXPIRY_DAYS:-7}
    volumes:
      - ./pdf_uploads:/app/pdf_uploads
      - ./fhir_results:/app/fhir_results
      - ./gcp-service-account.json:/app/gcp-service-account.json:ro
    depends_on:
      - redis
      - session-logger

  pdf2nhcx:
    build:
      context: .
      dockerfile: pdf2nhcx/Dockerfile
    container_name: pdf2nhcx
    ports:
      - "8001:8001"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-service-account.json
      - REDIS_URL=redis://redis:6379/0
      - SESSION_LOGGER_URL=http://session-logger:8002
      - NHCX_SECRET_KEY=${NHCX_SECRET_KEY}
      - NHCX_AUTH_ENABLED=${NHCX_AUTH_ENABLED:-true}
      - NHCX_TOKEN_EXPIRY_DAYS=${NHCX_TOKEN_EXPIRY_DAYS:-7}
    volumes:
      - ./pdf_uploads:/app/pdf_uploads
      - ./nhcx_results:/app/nhcx_results
      - ./gcp-service-account.json:/app/gcp-service-account.json:ro
    depends_on:
      - redis
      - session-logger

  # ── NHCX Insurance Workers (4 replicas × concurrency 2 = 8 slots) ───────────
  celery-nhcx-worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    deploy:
      replicas: 4
    command: celery -A common.celery_app worker --loglevel=info --concurrency=2 -Q nhcx -I pdf2nhcx.tasks -n nhcx-worker@%h
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-service-account.json
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - ./pdf_uploads:/app/pdf_uploads
      - ./fhir_results:/app/fhir_results
      - ./nhcx_results:/app/nhcx_results
      - ./gcp-service-account.json:/app/gcp-service-account.json:ro
    depends_on:
      - redis

  # ── ABDM Clinical Workers (4 replicas × concurrency 2 = 8 slots) ─────────────
  celery-abdm-worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    deploy:
      replicas: 4
    command: celery -A common.celery_app worker --loglevel=info --concurrency=2 -Q abdm -I pdf2abdm.tasks -n abdm-worker@%h
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-service-account.json
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - ./pdf_uploads:/app/pdf_uploads
      - ./fhir_results:/app/fhir_results
      - ./nhcx_results:/app/nhcx_results
      - ./gcp-service-account.json:/app/gcp-service-account.json:ro
    depends_on:
      - redis


  frontend:
    build: 
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend-service
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - pdf2abdm
      - pdf2nhcx

  session-logger:
    build:
      context: .
      dockerfile: session_logger/Dockerfile
    container_name: session-logger
    ports:
      - "8002:8002"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - SQLITE_DATA_DIR=/app/data
    volumes:
      - ./server-ca.pem:/app/server-ca.pem:ro
      - ./client-cert.pem:/app/client-cert.pem:ro
      - ./client-key.pem:/app/client-key.pem:ro
      - ./session_logger_data:/app/data

  privacy-filter:
    build:
      context: .
      dockerfile: privacy_filter/Dockerfile
    container_name: privacy-filter
    ports:
      - "8003:8003"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - STORAGE_BACKEND=local
      - LOCAL_DATA_DIR=/tmp/data
      - KEYCLOAK_AUTH_ENABLED=false
      - SECRET_KEY=dev-secret
    volumes:
      - ./privacy_filter_data:/tmp/data

  forgensic:
    build:
      context: .
      dockerfile: forgensic/Dockerfile
    container_name: forgensic
    ports:
      - "8004:8004"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DATA_DIR=/app/forgensic_data
      - MAX_UPLOAD_BYTES=26214400
      - OCR_ENABLED=true
      - PIPELINE_PRESET=super_loose
      - FORGENSIC_SECRET_KEY=${FORGENSIC_SECRET_KEY}
      - FORGENSIC_AUTH_ENABLED=${FORGENSIC_AUTH_ENABLED:-true}
      - FORGENSIC_TOKEN_EXPIRY_DAYS=${FORGENSIC_TOKEN_EXPIRY_DAYS:-1}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./forgensic_data:/app/forgensic_data
    depends_on:
      - redis

  # ── Forgensic CV Workers (4 replicas × concurrency 2 = 8 parallel job slots) ──
  # Uses the same image as the forgensic API — CMD is overridden to start Celery.
  # Scale up replicas for more throughput; scale concurrency for more parallelism
  # per machine (keep concurrency ≤ CPU cores to avoid context-switch overhead).
  celery-forgensic-worker:
    build:
      context: .
      dockerfile: forgensic/Dockerfile
    deploy:
      replicas: 4
    command: >
      celery -A forgensic.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q forgensic
      -n forgensic-worker@%h
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DATA_DIR=/app/forgensic_data
      - OCR_ENABLED=true
      - PIPELINE_PRESET=super_loose
      - REDIS_URL=redis://redis:6379/0
      - JOB_TTL_SECONDS=3600
      - FORGENSIC_SECRET_KEY=${FORGENSIC_SECRET_KEY}
    volumes:
      - ./forgensic_data:/app/forgensic_data
    depends_on:
      - redis