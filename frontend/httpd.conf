# Enable required modules for reverse proxy
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule headers_module modules/mod_headers.so
LoadModule rewrite_module modules/mod_rewrite.so

# ProxyPreserveHost is intentionally OFF for Cloud Run proxy blocks below.
# Cloud Run requires the Host header to match its own domain; overriding it
# with the Apache server's hostname causes 503/400 rejections.
# Per-service overrides are set with RequestHeader where needed.
ProxyPreserveHost Off

# ── Timeout tuning ────────────────────────────────────────────────────────────
# PDF inference can take 8–15 min for large documents.
# ProxyTimeout: how long Apache waits for a response from the backend.
# Timeout:      how long Apache keeps the client connection open.
Timeout 960
ProxyTimeout 900

# pdf2abdm — listens on port 8000 inside the container
ProxyPass        /pdf2abdm/  http://pdf2abdm:8000/ retry=0
ProxyPassReverse /pdf2abdm/  http://pdf2abdm:8000/ retry=0

ProxyPass        /pdf2fhir/  http://pdf2abdm:8000/ retry=0
ProxyPassReverse /pdf2fhir/  http://pdf2abdm:8000/ retry=0

ProxyPass        /pdf2abdm   http://pdf2abdm:8000 retry=0
ProxyPassReverse /pdf2abdm   http://pdf2abdm:8000 retry=0

# pdf2nhcx — listens on port 8001 inside the container
ProxyPass        /pdf2nhcx/  http://pdf2nhcx:8001/ retry=0
ProxyPassReverse /pdf2nhcx/  http://pdf2nhcx:8001/ retry=0

ProxyPass        /ocr-service-problem-3/  http://pdf2nhcx:8001/ retry=0
ProxyPassReverse /ocr-service-problem-3/  http://pdf2nhcx:8001/ retry=0

ProxyPass        /pdf2nhcx   http://pdf2nhcx:8001 retry=0
ProxyPassReverse /pdf2nhcx   http://pdf2nhcx:8001 retry=0

# forgensic — listens on port 8004 inside the container
ProxyPass        /forgensic/  http://forgensic:8004/ retry=0
ProxyPassReverse /forgensic/  http://forgensic:8004/ retry=0

ProxyPass        /forgensic   http://forgensic:8004 retry=0
ProxyPassReverse /forgensic   http://forgensic:8004 retry=0

# session-logger — listens on port 8002 inside the container
ProxyPass        /session-logger/  http://session-logger:8002/
ProxyPassReverse /session-logger/  http://session-logger:8002/

# privacy-filter — Cloud Run service (migrated from local Docker container)
# All /privacy-filter/* requests are proxied to the Cloud Run endpoint.
# Using the stable vanity URL (not the internal generated URL).
SSLProxyEngine On
SSLProxyCheckPeerCN Off
SSLProxyCheckPeerName Off

<Location /privacy-filter/>
  ProxyPass        https://privacy-filter-147901050545.asia-south1.run.app/ retry=0
  ProxyPassReverse https://privacy-filter-147901050545.asia-south1.run.app/
  RequestHeader set Host "privacy-filter-147901050545.asia-south1.run.app"
</Location>

<Location /privacy-filter>
  ProxyPass        https://privacy-filter-147901050545.asia-south1.run.app retry=0
  ProxyPassReverse https://privacy-filter-147901050545.asia-south1.run.app
  RequestHeader set Host "privacy-filter-147901050545.asia-south1.run.app"
</Location>
