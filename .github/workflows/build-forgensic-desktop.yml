name: Build Forgensic Desktop App

on:
  push:
    tags:
      - 'v*' # Trigger on version tags e.g., v1.0.0
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: Forgensic-Linux-x86_64
          - os: ubuntu-24.04-arm
            artifact_name: Forgensic-Linux-ARM64
          - os: windows-latest
            artifact_name: Forgensic-Windows-x86_64.exe
          - os: macos-latest
            artifact_name: Forgensic-macOS-Universal

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx tesseract-ocr
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r forgensic/requirements.txt
          pip install customtkinter pyinstaller

      - name: Build with PyInstaller
        run: |
          cd forgensic
          pyinstaller forgensic_gui.spec

      - name: Rename Artifact (Unix)
        if: runner.os != 'Windows'
        run: mv forgensic/dist/Forgensic forgensic/dist/${{ matrix.artifact_name }}

      - name: Rename Artifact (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item -Path forgensic\dist\Forgensic.exe -NewName ${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: forgensic/dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
