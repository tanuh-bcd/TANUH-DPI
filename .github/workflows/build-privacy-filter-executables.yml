  # ═══════════════════════════════════════════════════════════════════════════
  # Job 5: Create GitHub Release (only on tags)
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    needs: [build-linux, build-linux-arm64, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mkdir -p release
          cp artifacts/pf-redact-linux-x86_64/pf-redact-1.0.0-x86_64.AppImage  release/pf-redact-linux-x86_64.AppImage
          cp artifacts/pf-redact-linux-aarch64/pf-redact                        release/pf-redact-linux-aarch64
          cp artifacts/pf-redact-windows-x86_64/pf-redact.exe                   release/pf-redact-windows-x86_64.exe
          cp artifacts/pf-redact-macos/pf-redact                                release/pf-redact-macos
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Privacy Filter CLI ${{ github.ref_name }}"
          body: |
            ## Privacy Filter CLI ${{ github.ref_name }}

            Command-line executables for offline PII detection and redaction in medical documents.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `pf-redact-linux-x86_64.AppImage` |
            | Linux ARM64 | `pf-redact-linux-aarch64` |
            | Windows x86_64 | `pf-redact-windows-x86_64.exe` |
            | macOS (Apple Silicon) | `pf-redact-macos` |

            ### Usage
            ```bash
            # Make executable (Linux/Mac only)
            chmod +x pf-redact*

            # Check model status
            ./pf-redact check

            # Redact a document (models auto-download on first run)
            ./pf-redact redact document.pdf -o redacted.pdf

            # Redact with JSON report
            ./pf-redact redact document.pdf -o redacted.pdf --json report.json

            # List supported file types
            ./pf-redact supported-types
            ```
          files: release/*
          draft: false
          prerelease: false
