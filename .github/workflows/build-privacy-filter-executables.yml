name: Build Privacy Filter Executables

# ─── Trigger ────────────────────────────────────────────────────────────────
# Run manually from GitHub UI, or on tagged releases
on:
  workflow_dispatch:          # Manual trigger from Actions tab
  push:
    tags:
      - 'pf-v*'              # Auto-trigger on privacy filter version tags

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: Linux -- AppImage (x86_64)
  # ═══════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 rsync wget tesseract-ocr

      - name: Build AppImage
        working-directory: privacy-filter-local
        run: |
          chmod +x build_appimage.sh
          ./build_appimage.sh

      - name: Verify AppImage
        working-directory: privacy-filter-local
        run: |
          chmod +x pf-redact-1.0.0-x86_64.AppImage
          ./pf-redact-1.0.0-x86_64.AppImage --version
          ./pf-redact-1.0.0-x86_64.AppImage --help
          ./pf-redact-1.0.0-x86_64.AppImage supported-types

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: pf-redact-linux-x86_64
          path: privacy-filter-local/pf-redact-1.0.0-x86_64.AppImage
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1b: Linux -- ARM64 (binary)
  # ═══════════════════════════════════════════════════════════════════════════
  build-linux-arm64:
    name: Linux ARM64 (binary)
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install dependencies
        working-directory: privacy-filter-local
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # CPU-only torch; fall back to default index if no aarch64 wheel on cpu index
          pip install torch --index-url https://download.pytorch.org/whl/cpu \
            || pip install torch
          pip install safetensors
          pip install .
          pip install pyinstaller
          # Remove torchvision/torchaudio if pulled in as transitive deps
          pip uninstall -y torchvision torchaudio 2>/dev/null || true

      - name: Build binary with PyInstaller
        working-directory: privacy-filter-local
        run: |
          pyinstaller --clean --noconfirm pf-redact.spec

      - name: Verify binary
        working-directory: privacy-filter-local
        run: |
          chmod +x dist/pf-redact
          ./dist/pf-redact --version
          ./dist/pf-redact --help
          ./dist/pf-redact supported-types

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pf-redact-linux-aarch64
          path: privacy-filter-local/dist/pf-redact
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Windows -- PyInstaller .exe
  # ═══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Windows (exe)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tesseract OCR
        run: |
          choco install tesseract -y

      - name: Install dependencies
        working-directory: privacy-filter-local
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install safetensors
          pip install .
          pip install pyinstaller
          pip uninstall -y torchvision torchaudio 2>$null; $true

      - name: Build exe with PyInstaller
        working-directory: privacy-filter-local
        run: |
          pyinstaller --clean --noconfirm pf-redact.spec

      - name: Verify exe
        working-directory: privacy-filter-local
        run: |
          .\dist\pf-redact.exe --version
          .\dist\pf-redact.exe --help
          .\dist\pf-redact.exe supported-types

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: pf-redact-windows-x86_64
          path: privacy-filter-local/dist/pf-redact.exe
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3: macOS -- PyInstaller binary
  # ═══════════════════════════════════════════════════════════════════════════
  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tesseract OCR
        run: |
          brew install tesseract

      - name: Install dependencies
        working-directory: privacy-filter-local
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu \
            || pip install torch
          pip install safetensors
          pip install .
          pip install pyinstaller
          pip uninstall -y torchvision torchaudio 2>/dev/null || true

      - name: Build binary with PyInstaller
        working-directory: privacy-filter-local
        run: |
          pyinstaller --clean --noconfirm pf-redact.spec

      - name: Verify binary
        working-directory: privacy-filter-local
        run: |
          chmod +x dist/pf-redact
          ./dist/pf-redact --version
          ./dist/pf-redact --help
          ./dist/pf-redact supported-types

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pf-redact-macos
          path: privacy-filter-local/dist/pf-redact
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: Create GitHub Release (only on tags)
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    needs: [build-linux, build-linux-arm64, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/pf-v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts for release
        run: |
          mkdir -p release
          cp artifacts/pf-redact-linux-x86_64/pf-redact-1.0.0-x86_64.AppImage  release/pf-redact-linux-x86_64.AppImage
          cp artifacts/pf-redact-linux-aarch64/pf-redact                        release/pf-redact-linux-aarch64
          cp artifacts/pf-redact-windows-x86_64/pf-redact.exe                   release/pf-redact-windows-x86_64.exe
          cp artifacts/pf-redact-macos/pf-redact                                release/pf-redact-macos
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Privacy Filter ${{ github.ref_name }}"
          body: |
            ## Privacy Filter ${{ github.ref_name }}

            Single-file executables for redacting PII from documents locally using ML models.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `pf-redact-linux-x86_64.AppImage` |
            | Linux ARM64 (aarch64) | `pf-redact-linux-aarch64` |
            | Windows x86_64 | `pf-redact-windows-x86_64.exe` |
            | macOS (Apple Silicon) | `pf-redact-macos` |

            ### Prerequisites
            - **Tesseract OCR** must be installed on your system for image/scanned PDF support
              - Linux: `sudo apt install tesseract-ocr`
              - macOS: `brew install tesseract`
              - Windows: Download from https://github.com/UB-Mannheim/tesseract/wiki

            ### Usage
            ```bash
            # Make executable (Linux/Mac only)
            chmod +x pf-redact-*

            # Check models (downloads ~3 GB on first run)
            ./pf-redact check

            # Redact a document
            ./pf-redact redact scan.png -o redacted.png
            ./pf-redact redact report.pdf -o redacted.pdf
            ./pf-redact redact notes.docx -o redacted.docx

            # Save detection report as JSON
            ./pf-redact redact scan.png -o redacted.png -j report.json

            # List supported formats
            ./pf-redact supported-types
            ```
          files: release/*
          draft: false
          prerelease: false
