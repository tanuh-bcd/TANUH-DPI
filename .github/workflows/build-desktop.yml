name: Build Desktop Forgensic App

on:
  push:
    branches: [ "desktop-gui-final", "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr libgl1 libglib2.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter pillow opencv-python pytesseract numpy
        pip install -r forgensic/requirements.txt

    - name: Build Portable Executable (Linux/Mac)
      if: runner.os != 'Windows'
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "ForgensicApp" --add-data "frontend/assets:frontend/assets" forgensic/forgensic_gui.py

    - name: Build Portable Executable (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "ForgensicApp" --add-data "frontend/assets;frontend/assets" forgensic/forgensic_gui.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ForgensicApp-${{ matrix.os }}
        path: |
          dist/ForgensicApp.exe
          dist/ForgensicApp
          dist/ForgensicApp.app
